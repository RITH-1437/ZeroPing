name: ZeroPing CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify Framework
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: zeroping
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=zeroping" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: pdo_mysql
          tools: composer

      # Composer Validation
      - name: Validate composer.json
        run: composer validate --strict

      # Cache Dependencies
      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # Install
      - name: Install Dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction

      - name: Verify Autoload
        run: composer dump-autoload -o

      - name: PHP Syntax Check
        run: find app -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Framework Boot
        run: php zero

      - name: Framework Health
        run: php zero doctor

      - name: Core Commands
        run: |
          php zero version
          php zero about
          php zero route:list
          php zero config:test

      - name: Framework Components
        run: |
          php zero validate:test
          php zero orm:test
          php zero cache:test
          php zero storage:test
          php zero security:test

      - name: Framework Test Suite
        run: php zero test

      - name: Build Summary
        run: echo "✅ ZeroPing Framework build completed successfully."