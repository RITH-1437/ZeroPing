name: ZeroPing CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build & Verify Framework
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none
          extensions: pdo_mysql
          tools: composer

      # Composer Validation
      - name: Validate composer.json
        run: composer validate --strict

      # Cache Dependencies
      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      # Install
      - name: Install Dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-progress \
            --no-interaction

      - name: Verify Autoload
        run: composer dump-autoload -o

      - name: PHP Syntax Check
        run: find app -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Framework Boot
        run: php zero

      - name: Framework Health
        run: php zero doctor

      - name: Core Commands
        run: |
          php zero version
          php zero about
          php zero route:list
          php zero config:test

      - name: Framework Components
        run: |
          php zero validate:test
          php zero orm:test
          php zero cache:test
          php zero storage:test
          php zero security:test

      - name: Framework Test Suite
        run: php zero test

      - name: Build Summary
        run: echo "✅ ZeroPing Framework build completed successfully."