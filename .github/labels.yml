labels:
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  - name: "enhancement"
    color: "a2eeef"
    description: "New feature or request"
  - name: "documentation"
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: "good first issue"
    color: "7057ff"
    description: "Good for newcomers"
  - name: "help wanted"
    color: "008672"
    description: "Extra attention is needed"
  - name: "question"
    color: "d876e3"
    description: "Further information is requested"
  - name: "security"
    color: "b60205"
    description: "Security-related issue or fix"
  - name: "performance"
    color: "fbca04"
    description: "Performance improvement"
  - name: "testing"
    color: "c5def5"
    description: "Test coverage, fixtures, or CI"
  - name: "cli"
    color: "bfd4f2"
    description: "ZeroPing console / `php zero` commands"
  - name: "orm"
    color: "bfd4f2"
    description: "Models, query builder, migrations, or seeders"
  - name: "http"
    color: "bfd4f2"
    description: "Routing, controllers, middleware, requests, responses"
  - name: "dependencies"
    color: "0366d6"
    description: "Pull requests that update a dependency"
  - name: "wontfix"
    color: "ffffff"
    description: "This will not be worked on"
  - name: "duplicate"
    color: "cfd3d7"
    description: "This issue or pull request already exists"
  - name: "invalid"
    color: "e4e669"
    description: "This doesn't seem right"
