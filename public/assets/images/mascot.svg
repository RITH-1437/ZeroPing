<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreSolid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="60%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <linearGradient id="hexStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowHeavy">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      .float { animation: float 4s ease-in-out infinite; }
      .float-delay { animation: float 4s ease-in-out infinite; animation-delay: -2s; }
      .spin { animation: spin 8s linear infinite; transform-origin: 100px 100px; }
      .spin-reverse { animation: spin-reverse 12s linear infinite; transform-origin: 100px 100px; }
      .pulse { animation: pulse 3s ease-in-out infinite; transform-origin: 100px 100px; }
      .radar { animation: radar 3s ease-out infinite; transform-origin: 100px 100px; }
      .radar-delay { animation: radar 3s ease-out infinite; animation-delay: 1s; transform-origin: 100px 100px; }
      .radar-delay-2 { animation: radar 3s ease-out infinite; animation-delay: 2s; transform-origin: 100px 100px; }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.6; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
      @keyframes radar { 0% { opacity: 0.6; transform: scale(0.8); } 100% { opacity: 0; transform: scale(2.5); } }
    </style>
  </defs>

  <g class="float">
    <!-- Outer glow -->
    <circle cx="100" cy="100" r="60" fill="url(#coreGlow)" filter="url(#glowHeavy)"/>

    <!-- Hexagon frame -->
    <polygon points="100,40 148,68 148,132 100,160 52,132 52,68"
             fill="none" stroke="url(#hexStroke)" stroke-width="2" class="spin"/>

    <!-- Hexagon inner glow -->
    <polygon points="100,48 140,72 140,128 100,152 60,128 60,72"
             fill="none" stroke="#22D3EE" stroke-opacity="0.15" stroke-width="1" class="spin-reverse"/>

    <!-- Radar waves -->
    <circle cx="100" cy="100" r="20" fill="none" stroke="#22D3EE" stroke-opacity="0.4" stroke-width="1.5" class="radar"/>
    <circle cx="100" cy="100" r="20" fill="none" stroke="#22D3EE" stroke-opacity="0.3" stroke-width="1.5" class="radar-delay"/>
    <circle cx="100" cy="100" r="20" fill="none" stroke="#22D3EE" stroke-opacity="0.2" stroke-width="1.5" class="radar-delay-2"/>

    <!-- Energy core -->
    <circle cx="100" cy="100" r="24" fill="url(#coreSolid)" filter="url(#glow)"/>
    <circle cx="100" cy="100" r="22" fill="none" stroke="#22D3EE" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="100" cy="100" r="16" fill="none" stroke="#F8FAFC" stroke-opacity="0.3" stroke-width="0.5"/>

    <!-- Hidden Z shape -->
    <g filter="url(#glow)">
      <line x1="90" y1="92" x2="110" y2="92" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="110" y1="92" x2="90" y2="108" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="90" y1="108" x2="110" y2="108" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
